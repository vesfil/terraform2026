name: 'Terraform Destroy All Resources'

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm deletion of ALL resources'
        required: true
        type: string

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform_destroy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify destruction confirmation
      if: ${{ github.event.inputs.confirm != 'destroy' }}
      run: |
        echo "❌ ERROR: You must type 'destroy' to confirm resource deletion"
        echo "Please run the workflow again and type 'destroy' in the confirm field"
        exit 1

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4

    - name: Terraform Init
      run: terraform init

    - name: Show resources that will be destroyed
      run: |
        echo "📋 Resources that will be destroyed:"
        terraform state list || echo "No resources found in state"

    - name: Terraform Destroy
      run: terraform destroy -auto-approve

    - name: Verify destruction
      run: |
        echo "✅ Destroy completed!"
        echo "Resources remaining in state:"
        terraform state list || echo "State is empty"